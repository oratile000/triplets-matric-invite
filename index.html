<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Matric Dance Journey - Oratile, Onthatile, Omphile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Playfair Display', 'Georgia', serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f5f5f5;
            overflow: hidden;
        }

        /* Particle background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, #d4af37 0%, #c9a227 100%);
            border-radius: 50%;
            opacity: 0.6;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) translateX(0px);
                opacity: 0;
            }
            50% {
                opacity: 0.6;
            }
        }

        /* Loading screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            animation: fadeOutScreen 0.8s ease-out 3s forwards;
        }

        @keyframes fadeOutScreen {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                display: none;
            }
        }

        .loading-text {
            font-size: 2.5rem;
            color: #d4af37;
            letter-spacing: 3px;
            animation: fadeInText 1.5s ease-out 0.5s both;
            text-align: center;
            font-weight: 300;
        }

        @keyframes fadeInText {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: containerFadeIn 0.8s ease-out 3.2s forwards;
        }

        @keyframes containerFadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Envelope styles */
        .envelope-wrapper {
            perspective: 1000px;
            width: 100%;
            max-width: 500px;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            border: 2px solid #d4af37;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.3), inset 0 0 60px rgba(212, 175, 55, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s ease-out;
            animation: envelopeEntry 1s ease-out 3.5s both;
        }

        @keyframes envelopeEntry {
            from {
                transform: scale(0.8) translateY(30px);
                opacity: 0;
            }
            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .envelope:hover {
            box-shadow: 0 25px 80px rgba(212, 175, 55, 0.4), inset 0 0 80px rgba(212, 175, 55, 0.15);
            transform: scale(1.02);
        }

        .envelope.opening {
            animation: envelopeOpen 1s ease-out forwards;
        }

        @keyframes envelopeOpen {
            0% {
                transform: scale(1) rotateX(0deg);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(0.95) rotateX(-20deg);
                opacity: 0;
            }
        }

        /* Wax seal */
        .wax-seal {
            position: relative;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 30% 30%, #e8c547, #d4af37, #b8860b);
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.5), inset -2px -2px 5px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: #2a2a2a;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            animation: sealPulse 2s ease-in-out infinite 3.5s;
        }

        @keyframes sealPulse {
            0%, 100% {
                box-shadow: 0 10px 30px rgba(212, 175, 55, 0.5), inset -2px -2px 5px rgba(0, 0, 0, 0.3);
            }
            50% {
                box-shadow: 0 15px 40px rgba(212, 175, 55, 0.7), inset -2px -2px 5px rgba(0, 0, 0, 0.3);
            }
        }

        .envelope:hover .wax-seal {
            transform: scale(1.1) rotate(5deg);
        }

        /* Content section */
        .content-section {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            overflow-y: auto;
            padding: 40px 20px;
            animation: contentFadeIn 0.8s ease-out forwards;
        }

        .content-section.active {
            opacity: 1;
            pointer-events: auto;
            animation: contentFadeIn 0.8s ease-out forwards;
        }

        @keyframes contentFadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .close-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            background: none;
            border: 2px solid #d4af37;
            color: #d4af37;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 30;
        }

        .close-btn:hover {
            background: #d4af37;
            color: #0a0a0a;
            transform: rotate(90deg);
        }

        /* Welcome section */
        .welcome-section {
            text-align: center;
            animation: fadeInUp 1s ease-out forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-section h1 {
            font-size: 3.5rem;
            color: #d4af37;
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 4px;
            line-height: 1.2;
        }

        .welcome-section h2 {
            font-size: 2.5rem;
            color: #f5f5f5;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 3px;
        }

        .welcome-section p {
            font-size: 1.3rem;
            color: #b8860b;
            letter-spacing: 2px;
            font-weight: 300;
        }

        /* Decorative line */
        .divider {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 30px 0;
        }

        /* Scroll indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(10px);
            }
        }

        .scroll-indicator p {
            color: #d4af37;
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .scroll-arrow {
            width: 24px;
            height: 24px;
            border: 2px solid #d4af37;
            border-top: none;
            border-left: none;
            transform: rotate(-45deg);
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .loading-text {
                font-size: 1.8rem;
                letter-spacing: 2px;
            }

            .envelope-wrapper {
                max-width: 350px;
                height: 250px;
            }

            .wax-seal {
                width: 90px;
                height: 90px;
                font-size: 0.9rem;
            }

            .welcome-section h1 {
                font-size: 2.2rem;
                letter-spacing: 2px;
            }

            .welcome-section h2 {
                font-size: 1.6rem;
                letter-spacing: 2px;
            }

            .welcome-section p {
                font-size: 1rem;
                letter-spacing: 1px;
            }

            .close-btn {
                top: 20px;
                right: 20px;
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Particle background -->
    <div class="particles" id="particleContainer"></div>

    <!-- Loading screen -->
    <div class="loading-screen">
        <div class="loading-text">Every story has a beginning...</div>
    </div>

    <!-- Main container with envelope -->
    <div class="container" id="mainContainer">
        <div class="envelope-wrapper">
            <div class="envelope" id="envelope">
                <div class="wax-seal" id="waxSeal">
                    <span id="sealText">N Family</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Content section (shows after envelope opens) -->
    <div class="content-section" id="contentSection">
        <button class="close-btn" id="closeBtn">&times;</button>
        
        <div class="welcome-section">
            <h1>The Matric Dance Journey</h1>
            <div class="divider"></div>
            <h2>Oratile • Onthatile • Omphile</h2>
            <p>Three siblings. One journey. One unforgettable evening.</p>
        </div>

        <div class="scroll-indicator">
            <p>SCROLL TO DISCOVER</p>
            <div class="scroll-arrow"></div>
        </div>
    </div>

    <script>
        // Create floating gold particles
        function createParticles() {
            const container = document.getElementById('particleContainer');
            const particleCount = window.innerWidth < 768 ? 15 : 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 6 + 2;
                const duration = Math.random() * 4 + 4;
                const delay = Math.random() * 2;
                
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDuration = duration + 's';
                particle.style.animationDelay = delay + 's';
                
                container.appendChild(particle);
            }
        }

        // Handle envelope click
        function handleEnvelopeClick() {
            const envelope = document.getElementById('envelope');
            const contentSection = document.getElementById('contentSection');
            const mainContainer = document.getElementById('mainContainer');
            
            envelope.classList.add('opening');
            
            setTimeout(() => {
                mainContainer.style.display = 'none';
                contentSection.classList.add('active');
                
                // Play subtle sound effect (using Web Audio API)
                playEnvelopeSound();
            }, 1000);
        }

        // Simple envelope opening sound using Web Audio API
        function playEnvelopeSound() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gain = audioContext.createGain();
                
                oscillator.connect(gain);
                gain.connect(audioContext.destination);
                
                oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(330, audioContext.currentTime + 0.1);
                
                gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.1);
            } catch (e) {
                console.log('Audio context not available');
            }
        }

        // Handle close button
        function handleClose() {
            const contentSection = document.getElementById('contentSection');
            const mainContainer = document.getElementById('mainContainer');
            
            contentSection.classList.remove('active');
            mainContainer.style.display = 'flex';
        }

        // Add mouse tilt effect to envelope
        const envelope = document.getElementById('envelope');
        document.addEventListener('mousemove', (e) => {
            if (envelope.classList.contains('opening')) return;
            
            const rect = envelope.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const tiltX = (y - rect.height / 2) * 0.02;
            const tiltY = (x - rect.width / 2) * -0.02;
            
            envelope.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale(1.02)`;
        });

        document.addEventListener('mouseleave', () => {
            envelope.style.transform = 'rotateX(0) rotateY(0) scale(1)';
        });

        // Event listeners
        envelope.addEventListener('click', handleEnvelopeClick);
        document.getElementById('closeBtn').addEventListener('click', handleClose);

        // Prevent scroll on loading screen
        window.addEventListener('load', () => {
            createParticles();
        });

        // Add touch support for mobile
        let touchStartX = 0;
        envelope.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });

        envelope.addEventListener('touchend', (e) => {
            handleEnvelopeClick();
        });
    </script>
</body>
</html>
